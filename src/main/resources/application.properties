spring.application.name=task
spring.datasource.url=jdbc:mysql://localhost:3306/chit_management?useSSL=false&serverTimeZone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
jwt.secret=chit_jwt_secret_key_@2026!!_secure_key
jwt.name=chit
#86400
jwt.expiration=15000

# Disable Whitelabel error page
spring.web.error.whitelabel.enabled=false

# Show error details
spring.web.error.include-message=always
spring.web.error.include-binding-errors=always

# Disable Spring Boot's default error controller
spring.autoconfigure.exclude=org.springframework.boot.webmvc.autoconfigure.error.ErrorMvcAutoConfiguration

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.boot.web.servlet.error=DEBUG

spring.session.store-type=none
