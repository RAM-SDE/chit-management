<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <th:block th:replace="~{layouts/header :: common_head('Enrollments')}"></th:block>
</head>
<body>

<div th:replace="~{layouts/navbar :: navbar}"></div>
<div th:replace="~{layouts/sidebar :: sidebar}"></div>
<div id="sidebarOverlay"></div>

<div id="mainContent" class="p-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">
            <i class="fas fa-user-check me-2 text-primary"></i>Enrollments
        </h4>
        <button class="btn btn-primary btn-sm"
                onclick="openEnrollModal()">
            <i class="fas fa-plus-circle me-1"></i>New Enrollment
        </button>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <table id="enrollmentTable"
                   data-toggle="table"
                   data-url="/api/enrollments"
                   data-side-pagination="server"
                   data-pagination="true"
                   data-page-size="10"
                   data-page-list="[10,25,50]"
                   data-search="true"
                   data-search-on-enter-key="false"
                   data-query-params="queryParams"
                   data-classes="table table-hover align-middle mb-0"
                   data-thead-classes="table-light"
                   data-response-handler="responseHandler">
                <thead>
                <tr>
                    <th data-field="index"
                        data-formatter="indexFormatter">#</th>
                    <th data-field="customerName"
                        data-sortable="true">Customer</th>
                    <th data-field="customerPhone"
                        data-sortable="true">Phone</th>
                    <th data-field="planName"
                        data-sortable="true">Plan</th>
                    <th data-field="monthlyAmount"
                        data-sortable="true">Monthly</th>
                    <th data-field="enrolledAt"
                        data-sortable="true">Enrolled On</th>
                    <th data-field="status"
                        data-formatter="statusFormatter"
                        data-sortable="true">Status</th>
                    <th data-field="enrolledBy"
                        data-sortable="true">Enrolled By</th>
                    <th data-field="uuid"
                        data-formatter="actionFormatter">Actions</th>
                </tr>
                </thead>
            </table>
        </div>
    </div>
</div>

<!-- Enroll Modal -->
<div class="modal fade" id="enrollModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">
                    <i class="fas fa-user-check me-2"></i>New Enrollment
                </h5>
                <button type="button" class="btn-close btn-close-white"
                        data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="enrollForm">

                    <!-- Customer Search -->
                    <div class="mb-3">
                        <label class="form-label">
                            Customer <span class="text-danger">*</span>
                        </label>
                        <input type="text"
                               id="customerSearch"
                               class="form-control"
                               placeholder="Search by name or phone">
                        <div id="customerResults"
                             class="list-group mt-1"
                             style="display:none; max-height:200px;
                                    overflow-y:auto;"></div>
                        <input type="hidden" id="selectedCustomerUuid">
                        <div id="selectedCustomerName"
                             class="mt-1 text-success small"></div>
                        <div id="customerUuidError"
                             class="text-danger small mt-1"></div>
                    </div>

                    <!-- Plan Select -->
                    <div class="mb-3">
                        <label class="form-label">
                            Chit Plan <span class="text-danger">*</span>
                        </label>
                        <select id="chitPlanUuid" class="form-select">
                            <option value="">Select a plan</option>
                        </select>
                        <div id="chitPlanUuidError"
                             class="text-danger small mt-1"></div>
                    </div>

                </form>
            </div>
            <div class="modal-footer">
                <button type="button"
                        class="btn btn-secondary"
                        data-bs-dismiss="modal">Cancel</button>
                <button type="button"
                        class="btn btn-primary"
                        onclick="submitEnroll()">
                    <i class="fas fa-save me-1"></i>Enroll
                </button>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{layouts/profile :: profileEdit}"></div>
<th:block th:replace="~{layouts/footer :: common_footer}"></th:block>

<script th:src="@{/js/navbar.js}"></script>
<script th:src="@{/js/sidebar.js}"></script>
<script th:src="@{/js/enrollment/view-enrollment.js}"></script>

</body>
</html>
