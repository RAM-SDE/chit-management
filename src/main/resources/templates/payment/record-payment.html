<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layouts/header :: common_head('Record Payment')}"></th:block>
</head>
<body>

<div th:replace="~{layouts/navbar :: navbar}"></div>
<div th:replace="~{layouts/sidebar :: sidebar}"></div>
<div id="sidebarOverlay"></div>

<div id="mainContent" class="p-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">
            <i class="fas fa-plus-circle me-2 text-primary"></i>
            Record Payment
        </h4>
        <a th:href="@{/payments}" class="btn btn-outline-secondary btn-sm">
            <i class="fas fa-arrow-left me-1"></i>Back
        </a>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
            <form id="paymentForm">

                <!-- Step 1: Search Customer -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        Step 1 — Search Customer
                        <span class="text-danger">*</span>
                    </label>
                    <input type="text"
                           id="customerSearch"
                           class="form-control"
                           placeholder="Search by name or phone">
                    <div id="customerResults"
                         class="list-group mt-1"
                         style="display:none; max-height:200px;
                                overflow-y:auto;"></div>
                    <div id="selectedCustomerName"
                         class="mt-1 text-success small"></div>
                </div>

                <!-- Step 2: Select Enrollment -->
                <div class="mb-3" id="enrollmentSection"
                     style="display:none;">
                    <label class="form-label fw-semibold">
                        Step 2 — Select Enrolled Plan
                        <span class="text-danger">*</span>
                    </label>
                    <select id="enrollmentUuid" class="form-select">
                        <option value="">Select a plan</option>
                    </select>
                    <div id="enrollmentUuidError"
                         class="text-danger small mt-1"></div>
                </div>

                <!-- Step 3: Select Months -->
                <div class="mb-3" id="monthSection"
                     style="display:none;">
                    <label class="form-label fw-semibold">
                        Step 3 — Select Month(s)
                        <span class="text-danger">*</span>
                    </label>
                    <div id="monthCheckboxes"
                         class="d-flex flex-wrap gap-2"></div>
                    <div id="monthNumbersError"
                         class="text-danger small mt-1"></div>
                </div>

                <!-- Step 4: Payment Details -->
                <div id="paymentDetailsSection"
                     style="display:none;">
                    <div class="row g-3">

                        <!-- Amount — readonly -->
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">
                                Amount (₹)
                            </label>
                            <input type="text"
                                   id="amountDisplay"
                                   class="form-control bg-light"
                                   readonly>
                        </div>

                        <!-- Payment Mode -->
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">
                                Payment Mode
                                <span class="text-danger">*</span>
                            </label>
                            <select id="paymentMode" class="form-select">
                                <option value="">Select mode</option>
                                <option value="CASH">Cash</option>
                                <option value="UPI">UPI</option>
                                <option value="BANK_TRANSFER">Bank Transfer</option>
                                <option value="CHEQUE">Cheque</option>
                            </select>
                            <div id="paymentModeError"
                                 class="text-danger small mt-1"></div>
                        </div>

                        <!-- Remarks -->
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">
                                Remarks
                            </label>
                            <input type="text"
                                   id="remarks"
                                   class="form-control"
                                   placeholder="Optional">
                        </div>

                    </div>

                    <div class="mt-4">
                        <button type="submit"
                                class="btn btn-primary">
                            <i class="fas fa-save me-1"></i>
                            Record Payment
                        </button>
                    </div>
                </div>

            </form>
        </div>
    </div>

    <!-- Receipt Card — shown after success -->
    <div id="receiptCard" class="card border-0 shadow-sm mt-4"
         style="display:none;">
        <div class="card-header bg-success text-white">
            <h6 class="mb-0">
                <i class="fas fa-receipt me-2"></i>Payment Receipt
            </h6>
        </div>
        <div class="card-body">
            <div class="row g-3" id="receiptContent"></div>
            <div class="mt-3">
                <button class="btn btn-outline-primary btn-sm"
                        onclick="printReceipt()">
                    <i class="fas fa-print me-1"></i>Print
                </button>
                <button class="btn btn-outline-secondary btn-sm ms-2"
                        onclick="resetForm()">
                    <i class="fas fa-plus me-1"></i>Record Another
                </button>
            </div>
        </div>
    </div>

</div>

<div th:replace="~{layouts/profile :: profileEdit}"></div>
<th:block th:replace="~{layouts/footer :: common_footer}"></th:block>

<script th:src="@{/js/navbar.js}"></script>
<script th:src="@{/js/sidebar.js}"></script>
<script th:src="@{/js/payment/record-payment.js}"></script>

</body>
</html>
