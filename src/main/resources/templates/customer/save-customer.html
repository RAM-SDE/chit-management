<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{layouts/header :: common_head('Customer Form')}"></th:block>
</head>

<body>

<div th:replace="~{layouts/navbar :: navbar}"></div>
<div th:replace="~{layouts/sidebar :: sidebar}"></div>
<div id="sidebarOverlay"></div>

<div id="mainContent" class="p-4">

    <!-- Page Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">
            <i class="fas fa-user me-2 text-primary"></i>
            <span id="formTitle">Add Customer</span>
        </h4>
        <a th:href="@{/customers}" class="btn btn-outline-secondary btn-sm">
            <i class="fas fa-arrow-left me-1"></i>Back
        </a>
    </div>

    <!-- Form Card -->
    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
            <form id="customerForm">

                <!-- UUID hidden — only present on edit -->
                <input type="hidden" id="customerUuid">

                <div class="row g-3">

                    <!-- Name -->
                    <div class="col-md-6">
                        <label class="form-label">
                            Full Name <span class="text-danger">*</span>
                        </label>
                        <input type="text"
                               id="name"
                               class="form-control"
                               placeholder="Enter full name">
                        <div id="nameError" class="text-danger small mt-1"></div>
                    </div>

                    <!-- Phone -->
                    <div class="col-md-6">
                        <label class="form-label">
                            Phone <span class="text-danger">*</span>
                        </label>
                        <input type="text"
                               id="phone"
                               class="form-control"
                               placeholder="Enter 10-digit mobile number"
                               maxlength="10">
                        <div id="phoneError" class="text-danger small mt-1"></div>
                    </div>

                    <!-- Email -->
                    <div class="col-md-6">
                        <label class="form-label">Email</label>
                        <input type="email"
                               id="email"
                               class="form-control"
                               placeholder="Enter email address">
                        <div id="emailError" class="text-danger small mt-1"></div>
                    </div>

                    <!-- Aadhar No -->
                    <div class="col-md-6">
                        <label class="form-label">Aadhar No</label>
                        <input type="text"
                               id="aadharNo"
                               class="form-control"
                               placeholder="Enter Aadhar number"
                               maxlength="20">
                        <div id="aadharNoError" class="text-danger small mt-1"></div>
                    </div>

                    <!-- Address -->
                    <div class="col-12">
                        <label class="form-label">Address</label>
                        <textarea id="address"
                                  class="form-control"
                                  rows="3"
                                  placeholder="Enter address"></textarea>
                        <div id="addressError" class="text-danger small mt-1"></div>
                    </div>

                </div>

                <!-- Buttons -->
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-1"></i>
                        <span id="submitBtnText">Save Customer</span>
                    </button>
                    <a th:href="@{/customers}" class="btn btn-outline-secondary">
                        Cancel
                    </a>
                </div>

            </form>
        </div>
    </div>

</div>

<div th:replace="~{layouts/profile :: profileEdit}"></div>
<th:block th:replace="~{layouts/footer :: common_footer}"></th:block>

<script th:src="@{/js/navbar.js}"></script>
<script th:src="@{/js/sidebar.js}"></script>
<script th:inline="javascript">
    const PAGE_UUID = /*[[${uuid}]]*/ null; // passed from controller on edit
</script>
<script th:src="@{/js/customer/customer.js}"></script>

</body>
</html>
