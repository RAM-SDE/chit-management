<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <th:block th:replace="~{layouts/header :: common_head('Chit Plan Details')}"></th:block>
</head>
<body>

<div th:replace="~{layouts/navbar :: navbar}"></div>
<div th:replace="~{layouts/sidebar :: sidebar}"></div>
<div id="sidebarOverlay"></div>

<div id="mainContent" class="p-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">
            <i class="fas fa-file-contract me-2 text-primary"></i>
            Chit Plan Details
        </h4>
        <div class="d-flex gap-2">
            <a id="editBtn" href="#"
               class="btn btn-warning btn-sm"
               sec:authorize="hasRole('ROLE_ADMIN')">
                <i class="fas fa-edit me-1"></i>Edit
            </a>
            <a th:href="@{/chit-plans}"
               class="btn btn-outline-secondary btn-sm">
                <i class="fas fa-arrow-left me-1"></i>Back
            </a>
        </div>
    </div>

    <!-- Loading -->
    <div id="loadingSpinner" class="text-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
    </div>

    <!-- Detail Card -->
    <div id="planCard" class="card border-0 shadow-sm"
         style="display:none;">
        <div class="card-body p-4">

            <div class="row g-4">

                <div class="col-md-6">
                    <label class="text-muted small fw-semibold">
                        <i class="fas fa-tag me-1"></i>Plan Name
                    </label>
                    <p class="fw-bold fs-5 mb-0" id="viewPlanName">—</p>
                </div>

                <div class="col-md-6">
                    <label class="text-muted small fw-semibold">
                        <i class="fas fa-toggle-on me-1"></i>Status
                    </label>
                    <p class="mb-0" id="viewStatus">—</p>
                </div>

                <div class="col-md-4">
                    <label class="text-muted small fw-semibold">
                        <i class="fas fa-rupee-sign me-1"></i>Total Amount
                    </label>
                    <p class="fw-semibold mb-0" id="viewTotalAmount">—</p>
                </div>

                <div class="col-md-4">
                    <label class="text-muted small fw-semibold">
                        <i class="fas fa-calendar-alt me-1"></i>Monthly Amount
                    </label>
                    <p class="fw-semibold mb-0" id="viewMonthlyAmount">—</p>
                </div>

                <div class="col-md-4">
                    <label class="text-muted small fw-semibold">
                        <i class="fas fa-clock me-1"></i>Duration
                    </label>
                    <p class="mb-0" id="viewDuration">—</p>
                </div>

                <div class="col-md-4">
                    <label class="text-muted small fw-semibold">
                        <i class="fas fa-users me-1"></i>Total Members
                    </label>
                    <p class="mb-0" id="viewTotalMembers">—</p>
                </div>

                <div class="col-md-4">
                    <label class="text-muted small fw-semibold">
                        <i class="fas fa-calendar me-1"></i>Start Date
                    </label>
                    <p class="mb-0" id="viewStartDate">—</p>
                </div>

                <div class="col-md-4">
                    <label class="text-muted small fw-semibold">
                        <i class="fas fa-calendar-check me-1"></i>End Date
                    </label>
                    <p class="mb-0" id="viewEndDate">—</p>
                </div>

                <div class="col-md-6">
                    <label class="text-muted small fw-semibold">
                        <i class="fas fa-user me-1"></i>Created By
                    </label>
                    <p class="mb-0" id="viewCreatedBy">—</p>
                </div>

                <div class="col-md-6">
                    <label class="text-muted small fw-semibold">
                        <i class="fas fa-calendar me-1"></i>Created On
                    </label>
                    <p class="mb-0" id="viewCreatedAt">—</p>
                </div>

            </div>

            <!-- Status Actions — Admin only -->
            <div class="mt-4 pt-3 border-top d-flex gap-2"
                 sec:authorize="hasRole('ROLE_ADMIN')">
                <button id="completeBtn"
                        class="btn btn-outline-info"
                        style="display:none;">
                    <i class="fas fa-check me-1"></i>Mark Completed
                </button>
                <button id="cancelBtn"
                        class="btn btn-outline-danger"
                        style="display:none;">
                    <i class="fas fa-ban me-1"></i>Cancel Plan
                </button>
            </div>

        </div>
    </div>
</div>

<div th:replace="~{layouts/profile :: profileEdit}"></div>
<th:block th:replace="~{layouts/footer :: common_footer}"></th:block>

<script th:src="@{/js/navbar.js}"></script>
<script th:src="@{/js/sidebar.js}"></script>
<script th:inline="javascript">
    const PAGE_UUID = /*[[${uuid}]]*/ null;
</script>
<script th:src="@{/js/chitplan/show-chitplan.js}"></script>

</body>
</html>
