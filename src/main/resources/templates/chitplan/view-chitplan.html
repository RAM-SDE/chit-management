<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <th:block th:replace="~{layouts/header :: common_head('Chit Plans')}"></th:block>
</head>
<body>

<div th:replace="~{layouts/navbar :: navbar}"></div>
<div th:replace="~{layouts/sidebar :: sidebar}"></div>
<div id="sidebarOverlay"></div>

<div id="mainContent" class="p-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">
            <i class="fas fa-file-contract me-2 text-primary"></i>Chit Plans
        </h4>
        <a th:href="@{/chit-plans/new}"
           class="btn btn-primary btn-sm"
           sec:authorize="hasRole('ROLE_ADMIN')">
            <i class="fas fa-plus-circle me-1"></i>New Plan
        </a>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <table id="chitPlanTable"
                   data-toggle="table"
                   data-url="/api/chit-plans"
                   data-side-pagination="server"
                   data-pagination="true"
                   data-page-size="10"
                   data-page-list="[10,25,50]"
                   data-search="true"
                   data-search-on-enter-key="false"
                   data-query-params="queryParams"
                   data-classes="table table-hover align-middle mb-0"
                   data-thead-classes="table-light"
                   data-response-handler="responseHandler">
                <thead>
                <tr>
                    <th data-field="index"
                        data-formatter="indexFormatter">#</th>
                    <th data-field="planName"
                        data-sortable="true">Plan Name</th>
                    <th data-field="totalAmount"
                        data-formatter="amountFormatter"
                        data-sortable="true">Total Amount</th>
                    <th data-field="monthlyAmount"
                        data-formatter="amountFormatter"
                        data-sortable="true">Monthly</th>
                    <th data-field="durationMonths"
                        data-sortable="true">Duration</th>
                    <th data-field="totalMembers"
                        data-sortable="true">Members</th>
                    <th data-field="startDate"
                        data-sortable="true">Start Date</th>
                    <th data-field="status"
                        data-formatter="statusFormatter"
                        data-sortable="true">Status</th>
                    <th data-field="uuid"
                        data-formatter="actionFormatter">Actions</th>
                </tr>
                </thead>
            </table>
        </div>
    </div>
</div>

<div th:replace="~{layouts/profile :: profileEdit}"></div>
<th:block th:replace="~{layouts/footer :: common_footer}"></th:block>

<script th:src="@{/js/navbar.js}"></script>
<script th:src="@{/js/sidebar.js}"></script>
<script>
    let tableIndex = 0;

    function queryParams(params) {
        return {
            limit:  params.limit,
            offset: params.offset,
            search: params.search || ''
        };
    }

    function responseHandler(res) {
        tableIndex = 0;
        return res;
    }

    function indexFormatter(value, row, index) {
        return ++tableIndex;
    }

    function amountFormatter(value) {
        return value ? '₹' + Number(value).toLocaleString('en-IN') : '—';
    }

    function statusFormatter(value) {
        const map = {
            'ACTIVE':    'badge bg-success',
            'COMPLETED': 'badge bg-info',
            'CANCELLED': 'badge bg-danger'
        };
        return `<span class="${map[value] || 'badge bg-secondary'}">${value}</span>`;
    }

    function actionFormatter(value, row) {
        const uuid = row.uuid;
        const isActive = row.active;
        const isCancelledOrCompleted =
            row.status === 'CANCELLED' || row.status === 'COMPLETED';

        const editBtn = isActive && !isCancelledOrCompleted ? `
        <a href="/chit-plans/edit/${uuid}"
           class="btn btn-sm btn-outline-warning" title="Edit">
            <i class="fas fa-edit"></i>
        </a>` : '';

        // ✅ Show deactivate when active
        const deactivateBtn = isActive ? `
        <button class="btn btn-sm btn-outline-danger"
                onclick="confirmDeactivate('${uuid}')"
                title="Deactivate">
            <i class="fas fa-trash"></i>
        </button>` : '';

        // ✅ Show activate when inactive
        const activateBtn = !isActive ? `
        <button class="btn btn-sm btn-outline-success"
                onclick="confirmActivate('${uuid}')"
                title="Activate">
            <i class="fas fa-check-circle"></i>
        </button>` : '';

        return `
        <div class="d-flex gap-1">
            <a href="/chit-plans/view/${uuid}"
               class="btn btn-sm btn-outline-info" title="View">
                <i class="fas fa-eye"></i>
            </a>
            ${editBtn}
            ${deactivateBtn}
            ${activateBtn}
        </div>`;
    }

    function confirmActivate(uuid) {
        Swal.fire({
            title: 'Activate Plan?',
            text:  'Plan will be activated and enrollments resumed.',
            icon:  'question',
            showCancelButton:   true,
            confirmButtonColor: '#28a745',
            cancelButtonColor:  '#6c757d',
            confirmButtonText:  'Yes, Activate',
            cancelButtonText:   'Cancel'
        }).then((result) => {
            if (result.isConfirmed) {
                $.ajax({
                    url:  '/api/chit-plans/' + uuid + '/activate',
                    type: 'PATCH',
                    success: function (res) {
                        alertify.success(res.message);
                        $('#chitPlanTable').bootstrapTable('refresh');
                    },
                    error: function (err) {
                        alertify.error(
                            err.responseJSON?.error || 'Something went wrong'
                        );
                    }
                });
            }
        });
    }

    function confirmDeactivate(uuid) {
        Swal.fire({
            title: 'Deactivate Plan?',
            text:  'All enrollments will be withdrawn and pending payments cancelled.',
            icon:  'warning',
            showCancelButton:   true,
            confirmButtonColor: '#d33',
            cancelButtonColor:  '#6c757d',
            confirmButtonText:  'Yes, Deactivate',
            cancelButtonText:   'Cancel'
        }).then((result) => {
            if (result.isConfirmed) {
                $.ajax({
                    url:  '/api/chit-plans/' + uuid,
                    type: 'DELETE',
                    success: function (res) {
                        alertify.success(res.message);
                        $('#chitPlanTable').bootstrapTable('refresh');
                    },
                    error: function (err) {
                        alertify.error(
                            err.responseJSON?.error || 'Something went wrong'
                        );
                    }
                });
            }
        });
    }
</script>

</body>
</html>
