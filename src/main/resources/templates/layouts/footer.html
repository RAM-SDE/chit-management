<th:block xmlns:th="http://www.thymeleaf.org" th:fragment="common_footer">
    <script th:src="@{/js/jquery.min.js}"></script>
    <script th:src="@{/js/alertify.min.js}"></script>
    <script th:src="@{/js/all.min.js}"></script>
    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/js/bootstrap-table.min.js}"></script>
    <script th:src="@{/js/sweetalert.min.js}"></script>
    <script th:src="@{/js/app.js}"></script>
    <script>
        // ✅ Read email from JWT cookie directly
        function getEmailFromCookie() {
            const cookies = document.cookie.split(';');
            for (let cookie of cookies) {
                const [name, value] = cookie.trim().split('=');
                if (name === 'jwt') {
                    // Decode JWT payload (middle part)
                    const payload = value.split('.')[1];
                    const decoded = JSON.parse(atob(payload));
                    return decoded.sub; // subject = email
                }
            }
            return null;
        }
    </script>
    <script th:src="@{/js/profile.js}"></script>
</th:block>
