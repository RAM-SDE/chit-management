<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layouts/header :: common_head('Error Page')}"></th:block>
    <link rel="stylesheet" th:href="@{/css/error-page.css}">
</head>
<body>

<div class="container">
    <div class="d-flex justify-content-center">
        <div class="error-box">

            <!-- Icon -->
            <div class="icon-circle">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 512 512" fill="#842029">
                    <path d="M256 32c14.2 0 27.3 7.5 34.5 19.8l216 368c7.3 12.4 7.3 27.7 .2 40.1S486.3 480 472 480L40 480c-14.3 0-27.6-7.7-34.7-20.1s-7-27.8 .2-40.1l216-368C228.7 39.5 241.8 32 256 32zm0 128c-13.3 0-24 10.7-24 24l0 112c0 13.3 10.7 24 24 24s24-10.7 24-24l0-112c0-13.3-10.7-24-24-24zm32 224a32 32 0 1 0 -64 0 32 32 0 1 0 64 0z"/>
                </svg>
            </div>

            <!-- Error Code — from model -->
            <div class="error-code">
                Error <span th:text="${code}">500</span>
            </div>

            <!-- Title -->
            <h5 class="mt-2 mb-1 fw-semibold text-dark">Something went wrong</h5>

            <!-- Message — from model -->
            <p class="text-muted mb-4" style="font-size: 14px;" th:text="${message}">
                An unexpected error occurred on our server.
            </p>

            <!-- Tip Box -->
            <div class="alert alert-danger text-start py-2 px-3 mb-4" style="font-size: 13px;">
                <strong>What you can do:</strong>
                <ul class="mb-0 mt-1 ps-3">
                    <li>Refresh the page and try again</li>
                    <li>Clear your browser cache</li>
                    <li>Contact support if issue persists</li>
                </ul>
            </div>

            <!-- Buttons -->
            <a th:href="@{/}" class="btn btn-danger w-100 mb-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 576 512" fill="currentColor" style="margin-right: 8px;">
                    <path d="M575.8 255.5c0 18-15 32.1-32 32.1l-32 0 .7 160.2c0 2.7-.2 5.4-.5 8.1l0 16.2c0 22.1-17.9 40-40 40l-16 0c-1.1 0-2.2 0-3.3-.1c-1.4 .1-2.8 .1-4.2 .1L416 512l-24 0c-22.1 0-40-17.9-40-40l0-24 0-64c0-17.7-14.3-32-32-32l-64 0c-17.7 0-32 14.3-32 32l0 64 0 24c0 22.1-17.9 40-40 40l-24 0-31.9 0c-1.5 0-3-.1-4.5-.2c-1.2 .1-2.4 .2-3.6 .2l-16 0c-22.1 0-40-17.9-40-40l0-112c0-.9 0-1.9 .1-2.8l0-69.7-32 0c-18 0-32-14-32-32.1c0-9 3-17 10-24L266.4 8c7-7 15-8 22-8s15 2 21 7L564.8 231.5c8 7 12 15 11 24z"/>
                </svg>Go home
            </a>

            <!-- Error reference -->
            <p class="text-muted mt-3 mb-0" style="font-size: 12px;">
                Error reference: #ERR-<span th:text="${code}">500</span>
            </p>

        </div>
    </div>
</div>

</body>
</html>
